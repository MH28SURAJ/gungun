<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Welcome Gungun</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Poppins', sans-serif; 
            min-height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            background: #0b0719; 
            padding: 20px;
        }
        .bg-layer {
            position: fixed; top: -50%; left: -50%; width: 200%; height: 200%;
            z-index: -1; background: radial-gradient(circle at 50% 50%, #1b1136, #0b0719);
        }
        
        .splash-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            padding: 20px;
            max-width: 400px;
            width: 100%;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 30px 60px rgba(0,0,0,0.8);
        }

        /* Vertical Photo Collage */
        .photo-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 20px;
        }
        .photo-item {
            width: 100%;
            height: 200px; /* Vertical Portrait Size */
            border-radius: 15px;
            overflow: hidden;
            border: 2px solid rgba(255,215,0,0.3);
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        .photo-item img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Vertical fit karega */
        }
        /* Specific class for the "Mera Mann" main photo (Clear Face) */
        .main-photo {
            height: 240px; /* Thoda bada */
            border: 3px solid #ffd700;
        }

        .title { 
            font-family: 'Dancing Script', cursive; 
            color: #ffd700; 
            font-size: 2.5rem; 
            margin-bottom: 10px; 
            text-shadow: 0 0 20px rgba(255,215,0,0.4);
        }
        
        .countdown-box {
            background: rgba(0,0,0,0.5);
            padding: 15px;
            border-radius: 15px;
            margin: 15px 0;
            color: white;
            font-size: 1.2rem;
        }
        #timer { font-size: 2rem; color: #ffd700; font-weight: bold; }

        .btn-start {
            background: linear-gradient(135deg, #ffd700, #f0a500);
            color: #000;
            padding: 15px 30px;
            border: none;
            border-radius: 40px;
            font-weight: 700;
            font-size: 1.1rem;
            cursor: pointer;
            width: 100%;
            transition: 0.3s;
            box-shadow: 0 5px 20px rgba(255,215,0,0.3);
        }
        .btn-start:active { transform: scale(0.95); }
        .btn-start:disabled { opacity: 0.5; cursor: not-allowed; }

        @media (max-width: 480px) {
            .photo-item { height: 170px; }
            .main-photo { height: 200px; }
        }
    </style>
</head>
<body>
    <div class="bg-layer"></div>
    
    <div class="splash-card">
        <div class="photo-grid">
            <!-- Photo 1: Mera Mann (Main - Clear Face, Vertical) -->
            <div class="photo-item main-photo">
                <img src="photo1.jpg" alt="Main Photo"> <!-- Yahan apni Mera Mann wali photo daalo -->
            </div>
            <!-- Photo 2 & 3 (Vertical) -->
            <div class="photo-item">
                <img src="photo2.jpg" alt="Photo 2">
            </div>
            <div class="photo-item">
                <img src="photo3.jpg" alt="Photo 3">
            </div>
        </div>

        <div class="title">Wait for it... ✨</div>
        
        <div class="countdown-box">
            Card khulne mein baki hai: <br>
            <span id="timer">60</span> Seconds
        </div>

        <button class="btn-start" id="openCardBtn" disabled onclick="redirectToCard()">
            ⏳ Wait 30 Seconds...
        </button>
    </div>

    <!-- Audio -->
    <audio id="bgMusic" loop>
        <source src="birthday-music.mp3" type="audio/mpeg">
    </audio>

    <script>
        let timeLeft = 60; // 60 seconds wait
        const timerDisplay = document.getElementById('timer');
        const btn = document.getElementById('openCardBtn');

        // Music play
        const audio = document.getElementById('bgMusic');
        audio.play().catch(() => {
            document.body.addEventListener('click', () => audio.play(), { once: true });
        });

        // Countdown Logic
        const countdown = setInterval(() => {
            timeLeft--;
            timerDisplay.innerText = timeLeft;
            
            if (timeLeft <= 30) {
                btn.innerText = "🔓 Click to Open Birthday Card";
                btn.disabled = false;
                btn.style.background = "linear-gradient(135deg, #8a2be2, #4b0082)";
                btn.style.color = "white";
            }
            
            if (timeLeft <= 0) {
                clearInterval(countdown);
                timerDisplay.innerText = "0";
                btn.innerText = "🎂 Open Now!";
                redirectToCard(); // Auto redirect after 60 sec
            }
        }, 1000);

        function redirectToCard() {
            window.location.href = "birthday.html";
        }
    </script>
</body>
</html>
